name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu:22.04, ubuntu:24.04]
    runs-on: ubuntu-latest
    container: ${{ matrix.os }}
    steps:
      # Minimal Ubuntu images have no Git; checkout falls back to the GitHub API and cannot
      # fetch submodules. Install Git before checkout so clone + submodule init works.
      - name: Install Git
        run: |
          apt-get update -y -qq
          apt-get install -y -qq git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt update -y -qq
          apt install -y -qq \
            build-essential \
            cmake \
            libgtest-dev \
            libspdlog-dev \
            libyaml-cpp-dev

      - name: Check GCC/G++ version
        run: |
          if [ $(gcc -dumpversion) -lt 12 ]; then
            echo "Upgrading from GCC version $(gcc -dumpversion) to 12"
            apt install -y -qq gcc-12 g++-12
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120 --slave /usr/bin/g++ g++ /usr/bin/g++-12
            update-alternatives --set gcc /usr/bin/gcc-12
          else
            echo "Using GCC version $(gcc -dumpversion)"
          fi

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build/test --output-on-failure
