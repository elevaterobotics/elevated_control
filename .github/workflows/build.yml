name: CMake build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgtest-dev \
            libspdlog-dev \
            libyaml-cpp-dev

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build
